<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRF 2026 Goals Tracking Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e28;
    --border: #242836;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-sub: #9ca3af;
    --accent: #c8a96e;
    --accent-light: #e8d5a8;

    --on-track: #22c55e;
    --on-track-bg: rgba(34,197,94,0.12);
    --at-risk: #f59e0b;
    --at-risk-bg: rgba(245,158,11,0.12);
    --delayed: #ef4444;
    --delayed-bg: rgba(239,68,68,0.12);
    --complete: #3b82f6;
    --complete-bg: rgba(59,130,246,0.12);
    --not-started: #6b7280;
    --not-started-bg: rgba(107,114,128,0.12);

    --g1: #8b5cf6;
    --g2: #ec4899;
    --g3: #06b6d4;
    --g4: #10b981;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0d1020 0%, #12151c 60%, #0d1020 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 48px 28px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(200,169,110,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .org-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .header h1 span { color: var(--accent); }
  .header-sub {
    margin-top: 8px;
    color: var(--text-muted);
    font-size: 13.5px;
    font-weight: 400;
    max-width: 520px;
    line-height: 1.6;
  }

  /* SUMMARY PILLS */
  .summary-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 4px;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 100px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    cursor: default;
    transition: transform 0.15s;
  }
  .stat-pill:hover { transform: translateY(-1px); }
  .stat-pill .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stat-pill .count { font-weight: 700; font-size: 15px; }
  .pill-on-track .dot { background: var(--on-track); }
  .pill-on-track .count { color: var(--on-track); }
  .pill-at-risk .dot { background: var(--at-risk); }
  .pill-at-risk .count { color: var(--at-risk); }
  .pill-delayed .dot { background: var(--delayed); }
  .pill-delayed .count { color: var(--delayed); }
  .pill-complete .dot { background: var(--complete); }
  .pill-complete .count { color: var(--complete); }
  .pill-not-started .dot { background: var(--not-started); }
  .pill-not-started .count { color: var(--not-started); }
  .pill-total { border-color: var(--accent); }
  .pill-total .count { color: var(--accent); }

  /* PROGRESS BAR */
  .progress-section {
    max-width: 1400px;
    margin: 24px auto 0;
    padding: 0 48px;
  }
  .progress-bar-wrap { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; display: flex; }
  .progress-seg { height: 100%; transition: width 0.6s ease; }
  .seg-on-track { background: var(--on-track); }
  .seg-at-risk { background: var(--at-risk); }
  .seg-delayed { background: var(--delayed); }
  .seg-complete { background: var(--complete); }

  /* MAIN LAYOUT */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 48px 64px;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 28px;
    align-items: center;
  }
  .filter-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-right: 4px;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-sub);
    font-size: 12.5px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0a0c10; font-weight: 600; }

  /* GOAL CARDS */
  .goals-grid {
    display: grid;
    gap: 24px;
  }

  .goal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .goal-card:hover { box-shadow: 0 4px 32px rgba(0,0,0,0.3); }

  .goal-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 22px 28px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .goal-card.open .goal-header { border-bottom-color: var(--border); }

  .goal-num {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 18px;
    flex-shrink: 0;
  }
  .g1 .goal-num { background: rgba(139,92,246,0.15); color: var(--g1); }
  .g2 .goal-num { background: rgba(236,72,153,0.15); color: var(--g2); }
  .g3 .goal-num { background: rgba(6,182,212,0.15); color: var(--g3); }
  .g4 .goal-num { background: rgba(16,185,129,0.15); color: var(--g4); }

  .goal-title-wrap { flex: 1; min-width: 0; }
  .goal-title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 17px;
    line-height: 1.3;
    color: var(--text);
  }
  .goal-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .goal-progress-mini {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .mini-ring {
    width: 48px; height: 48px;
    position: relative;
  }
  .mini-ring svg { transform: rotate(-90deg); }
  .mini-ring .ring-pct {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--text);
  }

  .chevron {
    width: 20px; height: 20px; flex-shrink: 0;
    color: var(--text-muted);
    transition: transform 0.25s;
  }
  .goal-card.open .chevron { transform: rotate(180deg); }

  /* SUBGOAL SECTIONS */
  .goal-body { display: none; padding: 0; }
  .goal-card.open .goal-body { display: block; }

  .subgoal-section { border-bottom: 1px solid var(--border); }
  .subgoal-section:last-child { border-bottom: none; }

  .subgoal-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    background: var(--surface2);
    cursor: pointer;
    user-select: none;
  }
  .subgoal-header:hover { background: rgba(255,255,255,0.02); }
  .subgoal-name {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-sub);
    flex: 1;
  }
  .subgoal-count {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--border);
    padding: 2px 8px;
    border-radius: 100px;
  }

  /* INITIATIVE ROWS */
  .initiatives-table { width: 100%; }
  .initiative-row {
    display: grid;
    grid-template-columns: 1fr 160px 150px;
    gap: 0;
    padding: 0 28px;
    border-bottom: 1px solid var(--border);
    align-items: stretch;
    transition: background 0.12s;
  }
  .initiative-row:last-child { border-bottom: none; }
  .initiative-row:hover { background: rgba(255,255,255,0.015); }

  .col-initiative { padding: 16px 16px 16px 0; }
  .col-status { padding: 12px 16px; display: flex; align-items: center; justify-content: center; border-left: 1px solid var(--border); }
  .col-owner { padding: 12px 8px; display: flex; align-items: center; justify-content: center; border-left: 1px solid var(--border); }

  .initiative-title {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.45;
    margin-bottom: 4px;
  }
  .initiative-detail {
    font-size: 11.5px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .initiative-targets {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .target-chip {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-sub);
  }
  .target-chip.baseline { border-color: #374151; }
  .target-chip.target { border-color: var(--accent); color: var(--accent-light); }

  /* STATUS BADGE SELECT */
  .status-select {
    appearance: auto;
    -webkit-appearance: auto;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    padding: 7px 10px;
    border-radius: 8px;
    width: 100%;
    outline: none;
    transition: all 0.15s;
    color: var(--text-sub);
  }
  .status-select:hover { border-color: var(--accent); }
  .status-select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(200,169,110,0.15); }
  .status-select.on-track { background: var(--on-track-bg); color: var(--on-track); border-color: rgba(34,197,94,0.3); }
  .status-select.at-risk { background: var(--at-risk-bg); color: var(--at-risk); border-color: rgba(245,158,11,0.3); }
  .status-select.delayed { background: var(--delayed-bg); color: var(--delayed); border-color: rgba(239,68,68,0.3); }
  .status-select.complete { background: var(--complete-bg); color: var(--complete); border-color: rgba(59,130,246,0.3); }
  .status-select.not-started { background: var(--not-started-bg); color: var(--not-started); border-color: var(--border); }

  /* TABLE HEADER */
  .table-header {
    display: grid;
    grid-template-columns: 1fr 160px 150px;
    gap: 0;
    padding: 8px 28px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
  }
  .th {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .th:first-child { justify-content: flex-start; padding-left: 0; }

  /* OWNER BADGE */
  .owner-badge {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-sub);
    text-align: center;
    line-height: 1.4;
  }

  /* SAVE NOTIFICATION */
  .save-toast {
    position: fixed;
    bottom: 32px; right: 32px;
    background: var(--surface);
    border: 1px solid var(--on-track);
    color: var(--on-track);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .save-toast.show { opacity: 1; transform: translateY(0); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .header { padding: 24px 20px; }
    .main { padding: 24px 20px 48px; }
    .progress-section { padding: 0 20px; }
    .initiative-row {
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 16px 20px;
    }
    .col-quarter { border-left: none; justify-content: flex-start; padding: 0; }
    .col-owner { border-left: none; justify-content: flex-start; padding: 0; }
    .table-header { display: none; }
    .subgoal-header, .goal-header { padding: 14px 20px; }
    .quarters-mobile {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
  }
  .quarters-mobile-label {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }

  /* SCROLL FADE IN */
  .goal-card {
    animation: fadeUp 0.4s ease both;
  }
  .goal-card:nth-child(1) { animation-delay: 0.05s; }
  .goal-card:nth-child(2) { animation-delay: 0.12s; }
  .goal-card:nth-child(3) { animation-delay: 0.19s; }
  .goal-card:nth-child(4) { animation-delay: 0.26s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

          { title: 'Plan and launch an HRF Legacy Society for planned giving (wills and estates) in 2026', rationale: 'Give our donors support in making planned-estate gifts to HRF', owner: 'Clark & Nadeige', baseline: '—', target: 'Legacy Society live', timeline: '2026' }
        ]

  },
  {

    color: 'g3',
    sections: [
      {

        initiatives: [

        ]
      },
      {

        dept: 'Operations',
        initiatives: [
          { title: 'Develop impact metric dashboards with data collected', rationale: 'Collect data in the right places so we can use it for strategic decisions and to show impact', owner: 'Sandra & CK', baseline: '—', target: 'Impact dashboards deployed', timeline: 'End of Q2' }
        ]
      },
      {
        name: 'Data Analysis',
        dept: 'Operations',
        initiatives: [
          { title: 'Enable the organization to become data and metric oriented in its decision making and reporting', rationale: 'To further elevate HRF we need to collect and analyze our work so we can make informed decisions', owner: 'Sandra & CK', baseline: '—', target: 'Org-wide data & metric orientation', timeline: 'End of Q3' }
        ]
      },
      {

        dept: 'Operations',
        initiatives: [
          { title: 'Enable org-wide goal setting in the form of KPIs', rationale: 'In order to adopt a KPI framework the org must first be able to measure itself via key impact metrics', owner: 'Sandra & CK', baseline: '—', target: 'HRF Impact Framework launched', timeline: 'End of Q3' }
        ]
      },
      {
        name: 'Data-Driven Goal Setting',
        dept: 'Operations',
        initiatives: [
          { title: 'Transform the organization into a data-driven and goal-oriented organization', rationale: 'This will enable all business units to function in alignment with what is best for HRF', owner: 'Sandra & CK', baseline: '—', target: '2027 organizational KPIs supported by exec team', timeline: 'End of Q4' }
        ]
      }
    ]
  },
  {
    id: 'g4',
    num: '4',
    label: 'GOAL 4',
    title: 'Cross-Departmental Process Audit & SOP Implementation',
    color: 'g4',
    sections: [
      {
        name: 'Process Documentation & Audit',
        dept: 'Operations',
        initiatives: [
          { title: 'Conduct a cross-departmental process audit of all internal support functions (HR, Finance, Hybrid Work, Operations, Development, Marketing & Comms, Policy & Legal, IT/Digital, Creative)', rationale: 'Enable all programs to benefit from HRF\'s organizational capacity across all functions', owner: 'Sandra & CK', baseline: 'Informal / undocumented processes', target: 'Comprehensive process audit complete', timeline: 'End of Q1' }
        ]
      },
      {
        name: 'Systems & Training',
        dept: 'Operations',
        initiatives: [
          { title: 'Build a centralized digital SOP library with search functionality and complete info for HRF\'s internal functions', rationale: 'Making SOP documentation internally accessible and durable as a trusted organizational resource', owner: 'Sandra & CK', baseline: '—', target: 'SOP library live with full search functionality', timeline: 'End of Q2' },
          { title: 'Conduct staff trainings on company SOPs and ensure appropriate access to the company hub', rationale: 'A system is only as good as it is used by our staff', owner: 'Sandra & CK', baseline: '—', target: 'Staff trained on all SOPs', timeline: 'End of Q3' }
        ]

        ]
      }
    ]
  }

// Build initiative key for storage
function ikey(gIdx, sIdx, iIdx) {
  return `hrf_2026_g${gIdx}_s${sIdx}_i${iIdx}`;
}

// Load saved statuses
function loadStatuses() {
  const saved = {};
  GOALS.forEach((g, gi) => {
    g.sections.forEach((s, si) => {
      s.initiatives.forEach((_, ii) => {
        const k = ikey(gi,si,ii);
        saved[k] = localStorage.getItem(k) || 'Not Started';
      });
    });
  });
  return saved;
}

let statuses = loadStatuses();
let currentFilter = 'all';

function saveStatus(key, val) {
  statuses[key] = val;
  localStorage.setItem(key, val);
  updateSummary();
  showToast();
}

let toastTimer;
function showToast() {
  const t = document.getElementById('saveToast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGoals();
}

function getStatusCounts() {
  const counts = { 'On Track': 0, 'At Risk': 0, 'Delayed': 0, 'Complete': 0, 'Not Started': 0 };
  Object.values(statuses).forEach(v => {
    if (counts[v] !== undefined) counts[v]++;
  });
  return counts;
}

function updateSummary() {
  const total = GOALS.reduce((acc, g) => acc + g.sections.reduce((a, s) => a + s.initiatives.length, 0), 0);
  const counts = getStatusCounts();

  document.getElementById('summaryRow').innerHTML = `
    <div class="stat-pill pill-total"><span class="count">${total}</span> <span>Initiatives</span></div>
    <div class="stat-pill pill-on-track"><span class="dot"></span><span class="count">${counts['On Track']}</span> On Track</div>
    <div class="stat-pill pill-at-risk"><span class="dot"></span><span class="count">${counts['At Risk']}</span> At Risk</div>
    <div class="stat-pill pill-delayed"><span class="dot"></span><span class="count">${counts['Delayed']}</span> Delayed</div>
    <div class="stat-pill pill-complete"><span class="dot"></span><span class="count">${counts['Complete']}</span> Complete</div>
    <div class="stat-pill pill-not-started"><span class="dot"></span><span class="count">${counts['Not Started']}</span> Not Started</div>
  `;

  const total4 = Object.values(statuses).length;
  const bar = document.getElementById('progressBar');
  if (total4 > 0) {
    bar.innerHTML = ['On Track','At Risk','Delayed','Complete'].map(s => {
      const w = ((counts[s] / total4) * 100).toFixed(1);
      const cls = s.toLowerCase().replace(' ','-');
      return `<div class="progress-seg seg-${cls}" style="width:${w}%"></div>`;
    }).join('');
  }
}

function getInitiativeStatus(gi, si, ii) {
  return statuses[ikey(gi,si,ii)] || 'Not Started';
}

function initiativeMatchesFilter(gi, si, ii) {
  if (currentFilter === 'all') return true;
  return getInitiativeStatus(gi, si, ii) === currentFilter;
}

function makeStatusSelect(key) {
  const val = statuses[key] || 'Not Started';
  const cls = STATUS_CLASS[val] || 'not-started';
  const options = STATUS_OPTIONS.map(o =>
    `<option value="${o}" ${o===val?'selected':''}>${o}</option>`
  ).join('');
  return `<select class="status-select ${cls}" data-key="${key}" onchange="handleStatusChange(this)">${options}</select>`;
}

function handleStatusChange(el) {
  const key = el.dataset.key;
  const val = el.value;
  el.className = 'status-select ' + (STATUS_CLASS[val] || 'not-started');
  saveStatus(key, val);
  // Live-update the ring for the goal this initiative belongs to
  const card = el.closest('.goal-card');
  if (card) {
    const gi = parseInt(card.dataset.goal);
    const pct = getGoalCompletion(gi);
    const color = GOAL_COLORS[GOALS[gi].color];
    const r = 18, circ = 2 * Math.PI * r;
    const dash = (pct / 100) * circ;
    const arcs = card.querySelectorAll('.mini-ring circle');
    const arc = arcs[arcs.length - 1];
    const label = card.querySelector('.ring-pct');
    if (arc) arc.setAttribute('stroke-dasharray', dash + ' ' + circ);
    if (label) label.textContent = pct + '%';
  }
}

function getGoalCompletion(gi) {
  let total = 0, done = 0;
  GOALS[gi].sections.forEach((s, si) => {
    s.initiatives.forEach((_, ii) => {
      total++;
      if (statuses[ikey(gi,si,ii)] === 'Complete') done++;
    });
  });
  return total > 0 ? Math.round((done/total)*100) : 0;
}

function miniRing(pct, color) {
  const r = 18, cx = 24, cy = 24, circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return `<div class="mini-ring">
    <svg width="48" height="48" viewBox="0 0 48 48">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#242836" stroke-width="4"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
    </svg>
    <div class="ring-pct">${pct}%</div>
  </div>`;
}

const GOAL_COLORS = { g1: '#8b5cf6', g2: '#ec4899', g3: '#06b6d4', g4: '#10b981' };

function renderGoals() {
  const grid = document.getElementById('goalsGrid');
  grid.innerHTML = '';

  GOALS.forEach((goal, gi) => {
    const pct = getGoalCompletion(gi);
    const color = GOAL_COLORS[goal.color];

    // Check if goal has any matching initiatives for filter
    const hasMatch = goal.sections.some((s, si) =>
      s.initiatives.some((_, ii) => initiativeMatchesFilter(gi, si, ii))
    );
    if (!hasMatch) return;

    const card = document.createElement('div');
    card.className = `goal-card ${goal.color}`;
    card.dataset.goal = gi;

    // Count initiatives for this goal
    const totalInits = goal.sections.reduce((a, s) => a + s.initiatives.length, 0);

    card.innerHTML = `
      <div class="goal-header" onclick="toggleGoal(this)">
        <div class="goal-num">${goal.num}</div>
        <div class="goal-title-wrap">
          <div class="goal-title">${goal.title}</div>
          <div class="goal-meta">${goal.sections.length} sub-areas · ${totalInits} initiatives</div>
        </div>
        <div class="goal-progress-mini">
          ${miniRing(pct, color)}
        </div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
      <div class="goal-body">
        ${goal.sections.map((section, si) => {
          const visibleInits = section.initiatives.filter((_, ii) => initiativeMatchesFilter(gi, si, ii));
          if (visibleInits.length === 0) return '';
          return `
            <div class="subgoal-section">
              <div class="subgoal-header" onclick="toggleSubgoal(this)">
                <span class="subgoal-name">▸ ${section.name}</span>
                <span style="font-size:11px;color:var(--text-muted);margin-right:8px;">${section.dept}</span>
                <span class="subgoal-count">${visibleInits.length} initiative${visibleInits.length!==1?'s':''}</span>
                <svg style="width:14px;height:14px;color:var(--text-muted);flex-shrink:0;margin-left:8px;transition:transform 0.2s" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
              <div class="subgoal-body">
                <div class="table-header">
                  <div class="th">Initiative</div>
                  <div class="th">Owner</div>
                  <div class="th">Status</div>
                </div>
                <div class="initiatives-table">
                  ${section.initiatives.map((init, ii) => {
                    if (!initiativeMatchesFilter(gi, si, ii)) return '';
                    const k = ikey(gi,si,ii);
                    const chips = [
                      init.baseline && init.baseline !== '—' ? `<span class="target-chip baseline">Baseline: ${init.baseline}</span>` : '',
                      init.target ? `<span class="target-chip target">Target: ${init.target}</span>` : '',
                      init.timeline ? `<span class="target-chip">📅 ${init.timeline}</span>` : ''
                    ].filter(Boolean).join('');
                    return `<div class="initiative-row">
                      <div class="col-initiative">
                        <div class="initiative-title">${init.title}</div>
                        ${init.rationale ? `<div class="initiative-detail">${init.rationale}</div>` : ''}
                        ${chips ? `<div class="initiative-targets">${chips}</div>` : ''}
                      </div>
                      <div class="col-owner"><div class="owner-badge">${init.owner}</div></div>
                      <div class="col-status">${makeStatusSelect(k)}</div>
                    </div>`;
                  }).join('')}
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    grid.appendChild(card);
  });

  // Auto-open all goals
  document.querySelectorAll('.goal-card').forEach(c => c.classList.add('open'));
  // Auto-open all subgoal bodies
  document.querySelectorAll('.subgoal-body').forEach(b => b.style.display = 'block');
}

function toggleGoal(header) {
  const card = header.closest('.goal-card');
  card.classList.toggle('open');
}

function toggleSubgoal(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('svg');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
}

// Init
renderGoals();
updateSummary();
</script>
