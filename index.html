<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRF 2026 Goals Tracking Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --border: #e2e6eb;
    --text: #111827;
    --text-muted: #6b7280;
    --text-sub: #4b5563;
    --accent: #e8185e;
    --accent-light: #ff6b9d;

    --on-track: #16a34a;
    --on-track-bg: rgba(22,163,74,0.10);
    --at-risk: #d97706;
    --at-risk-bg: rgba(217,119,6,0.10);
    --delayed: #dc2626;
    --delayed-bg: rgba(220,38,38,0.10);
    --complete: #2563eb;
    --complete-bg: rgba(37,99,235,0.10);
    --not-started: #eab308;
    --not-started-bg: rgba(234,179,8,0.12);

    --g1: #7c3aed;
    --g2: #e8185e;
    --g3: #0891b2;
    --g4: #059669;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #fff0f4 0%, #ffffff 60%, #fff0f4 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 48px 28px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(232,24,94,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .org-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 900;
    line-height: 1.1;
    color: #111827;
    letter-spacing: -0.02em;
  }
  .header h1 span { color: var(--accent); }
  .header-sub {
    margin-top: 8px;
    color: var(--text-muted);
    font-size: 13.5px;
    font-weight: 400;
    max-width: 520px;
    line-height: 1.6;
  }

  /* SUMMARY PILLS */
  .summary-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 4px;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 100px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    cursor: default;
    transition: transform 0.15s;
  }
  .stat-pill:hover { transform: translateY(-1px); }
  .stat-pill .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stat-pill .count { font-weight: 700; font-size: 15px; }
  .pill-on-track .dot { background: var(--on-track); }
  .pill-on-track .count { color: var(--on-track); }
  .pill-at-risk .dot { background: var(--at-risk); }
  .pill-at-risk .count { color: var(--at-risk); }
  .pill-delayed .dot { background: var(--delayed); }
  .pill-delayed .count { color: var(--delayed); }
  .pill-complete .dot { background: var(--complete); }
  .pill-complete .count { color: var(--complete); }
  .pill-not-started .dot { background: var(--not-started); }
  .pill-not-started .count { color: var(--not-started); }
  .pill-total { border-color: var(--accent); }
  .pill-total .count { color: var(--accent); }

  /* PROGRESS BAR */
  .progress-section {
    max-width: 1400px;
    margin: 24px auto 0;
    padding: 0 48px;
  }
  .progress-bar-wrap { background: #e2e6eb; border-radius: 4px; height: 6px; overflow: hidden; display: flex; }
  .progress-seg { height: 100%; transition: width 0.6s ease; }
  .seg-on-track { background: var(--on-track); }
  .seg-at-risk { background: var(--at-risk); }
  .seg-delayed { background: var(--delayed); }
  .seg-complete { background: var(--complete); }

  /* VIZ SECTION */
  .viz-section {
    background: #fff;
    border-bottom: 1px solid var(--border);
  }
  .viz-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 48px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 32px;
    align-items: start;
  }
  .viz-block-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  /* Donut */
  .donut-row { display: flex; align-items: center; gap: 16px; }
  .donut-container { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
  .donut-container canvas { width: 90px !important; height: 90px !important; }
  .donut-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .donut-pct { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1; }
  .donut-sub { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .donut-legend { display: flex; flex-direction: column; gap: 5px; }
  .dl-item { display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--text-sub); }
  .dl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dl-count { font-weight: 700; color: var(--text); margin-left: auto; padding-left: 8px; }

  /* Goal bars */
  .gbar-row { margin-bottom: 10px; }
  .gbar-row:last-child { margin-bottom: 0; }
  .gbar-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .gbar-name { font-size: 11.5px; font-weight: 500; color: var(--text-sub); }
  .gbar-pct { font-size: 11px; font-weight: 700; color: var(--text); }
  .gbar-track { background: var(--surface2); border-radius: 6px; height: 10px; overflow: hidden; }
  .gbar-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease; }
  .gbar-status-row { display: flex; gap: 4px; margin-top: 4px; }
  .gbar-seg { height: 3px; border-radius: 2px; }



  @media (max-width: 900px) {
    .viz-inner { grid-template-columns: 1fr; padding: 20px; gap: 24px; }
  }

  /* MAIN LAYOUT */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 48px 64px;
  }

  /* FILTER PANEL */
  .filter-panel {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 24px;
  }
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-divider {
    height: 1px;
    background: var(--border);
    margin: 10px 0;
  }
  .filter-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-right: 2px;
    min-width: 40px;
  }
  .filter-btn {
    padding: 5px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-sub);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: #fff; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #ffffff; font-weight: 600; }
  .goal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  /* Dim non-active goal btns to their goal color on hover */
  .goal-btn:not(.active):hover { border-color: currentColor; }

  /* GOAL CARDS */
  .goals-grid {
    display: grid;
    gap: 24px;
  }

  .goal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .goal-card:hover { box-shadow: 0 4px 32px rgba(0,0,0,0.10); }

  .goal-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 22px 28px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .goal-card.open .goal-header { border-bottom-color: var(--border); border-bottom-width: 1px; }

  .goal-num {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 18px;
    flex-shrink: 0;
  }
  .g1 .goal-num { background: rgba(139,92,246,0.15); color: var(--g1); }
  .g2 .goal-num { background: rgba(236,72,153,0.15); color: var(--g2); }
  .g3 .goal-num { background: rgba(6,182,212,0.15); color: var(--g3); }
  .g4 .goal-num { background: rgba(16,185,129,0.15); color: var(--g4); }

  .goal-title-wrap { flex: 1; min-width: 0; }
  .goal-title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 17px;
    line-height: 1.3;
    color: var(--text);
  }
  .goal-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .goal-progress-mini {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .mini-ring {
    width: 48px; height: 48px;
    position: relative;
  }
  .mini-ring svg { transform: rotate(-90deg); }
  .mini-ring .ring-pct {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--text);
  }

  .chevron {
    width: 20px; height: 20px; flex-shrink: 0;
    color: var(--text-muted);
    transition: transform 0.25s;
  }
  .goal-card.open .chevron { transform: rotate(180deg); }

  /* SUBGOAL SECTIONS */
  .goal-body { display: none; padding: 0; }
  .goal-card.open .goal-body { display: block; }

  .subgoal-section { border-bottom: 1px solid var(--border); }
  .subgoal-section:last-child { border-bottom: none; }

  .subgoal-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    background: var(--surface2);
    cursor: pointer;
    user-select: none;
  }
  .subgoal-header:hover { background: rgba(255,255,255,0.02); }
  .subgoal-name {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-sub);
    flex: 1;
  }
  .subgoal-count {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--border);
    padding: 2px 8px;
    border-radius: 100px;
  }

  /* INITIATIVE ROWS */
  .initiatives-table { width: 100%; }
  .initiative-row {
    display: grid;
    grid-template-columns: 1fr 150px;
    gap: 0;
    padding: 0 28px;
    border-bottom: 1px solid var(--border);
    align-items: stretch;
    transition: background 0.12s;
  }
  .initiative-row:last-child { border-bottom: none; }
  .initiative-row:hover { background: rgba(255,255,255,0.015); }

  .col-initiative { padding: 16px 16px 16px 0; }
  .col-status { padding: 12px 16px; display: flex; align-items: center; justify-content: center; border-left: 1px solid var(--border); }
  .col-owner { padding: 12px 8px; display: flex; align-items: center; justify-content: center; border-left: 1px solid var(--border); }

  .initiative-title {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.45;
    margin-bottom: 4px;
  }
  .initiative-detail {
    font-size: 11.5px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .initiative-targets {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .target-chip {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-sub);
  }
  .target-chip.baseline { border-color: #374151; }
  .target-chip.target { border-color: var(--accent); color: var(--accent-light); }

  /* STATUS BADGE SELECT */
  .status-select {
    appearance: auto;
    -webkit-appearance: auto;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    padding: 7px 10px;
    border-radius: 8px;
    width: 100%;
    outline: none;
    transition: all 0.15s;
    color: var(--text-sub);
  }
  .status-select:hover { border-color: var(--accent); }
  .status-select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(200,169,110,0.15); }
  .status-select.on-track { background: var(--on-track-bg); color: var(--on-track); border-color: rgba(34,197,94,0.3); }
  .status-select.at-risk { background: var(--at-risk-bg); color: var(--at-risk); border-color: rgba(245,158,11,0.3); }
  .status-select.delayed { background: var(--delayed-bg); color: var(--delayed); border-color: rgba(239,68,68,0.3); }
  .status-select.complete { background: var(--complete-bg); color: var(--complete); border-color: rgba(59,130,246,0.3); }
  .status-select.not-started { background: var(--not-started-bg); color: var(--not-started); border-color: rgba(234,179,8,0.4); }

  /* TABLE HEADER */
  .table-header {
    display: grid;
    grid-template-columns: 1fr 150px;
    gap: 0;
    padding: 8px 28px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
  }
  .th {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .th:first-child { justify-content: flex-start; padding-left: 0; }

  /* RACI */
  .raci-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .raci-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-sub);
  }
  .raci-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 5px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .raci-R { background: rgba(232,24,94,0.12); color: #e8185e; }
  .raci-A { background: rgba(124,58,237,0.12); color: #7c3aed; }
  .raci-C { background: rgba(8,145,178,0.12); color: #0891b2; }
  .raci-I { background: rgba(107,114,128,0.12); color: #6b7280; }

  /* OWNER BADGE */
  .owner-badge {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-sub);
    text-align: center;
    line-height: 1.4;
  }

  /* SAVE NOTIFICATION */
  .save-toast {
    position: fixed;
    bottom: 32px; right: 32px;
    background: var(--surface);
    border: 1px solid var(--on-track);
    color: var(--on-track);
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .save-toast.show { opacity: 1; transform: translateY(0); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .header { padding: 24px 20px; }
    .main { padding: 24px 20px 48px; }
    .progress-section { padding: 0 20px; }
    .initiative-row {
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 16px 20px;
    }
    .col-quarter { border-left: none; justify-content: flex-start; padding: 0; }
    .col-owner { border-left: none; justify-content: flex-start; padding: 0; }
    .table-header { display: none; }
    .subgoal-header, .goal-header { padding: 14px 20px; }
    .quarters-mobile {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
  }
  .quarters-mobile-label {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }

  /* SCROLL FADE IN */
  .goal-card {
    animation: fadeUp 0.4s ease both;
  }
  .goal-card:nth-child(1) { animation-delay: 0.05s; }
  .goal-card:nth-child(2) { animation-delay: 0.12s; }
  .goal-card:nth-child(3) { animation-delay: 0.19s; }
  .goal-card:nth-child(4) { animation-delay: 0.26s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div class="org-tag">Human Rights Foundation · Strategic Planning · 2026</div>
        <div id="syncStatus" style="font-size:11px;font-weight:600;letter-spacing:0.05em;transition:color 0.3s;"></div>
      </div>
      <h1>Goals <span>Tracking</span> Dashboard</h1>
      <p class="header-sub">Team leads define initiatives supporting HRF's 4 organizational goals with clear metrics and quarterly tracking.</p>
    </div>
    <div>
      <div class="summary-row" id="summaryRow"></div>
    </div>
  </div>
</div>

<div class="viz-section">
  <div class="viz-inner">

    <!-- LEFT: Donut + legend -->
    <div class="viz-donut-wrap">
      <div class="viz-block-label">Overall status</div>
      <div class="donut-row">
        <div class="donut-container">
          <canvas id="donutChart" width="140" height="140"></canvas>
          <div class="donut-center" id="donutCenter">
            <span class="donut-pct" id="donutPct">0%</span>
            <span class="donut-sub">complete</span>
          </div>
        </div>
        <div class="donut-legend" id="donutLegend"></div>
      </div>
    </div>

    <!-- MIDDLE: Goal progress bars -->
    <div class="viz-goal-bars">
      <div class="viz-block-label">Progress by goal</div>
      <div id="goalBars"></div>
    </div>



  </div>
</div>

<div class="main">
  <div class="filter-panel">
    <div class="filter-row">
      <span class="filter-label">Status</span>
      <button class="filter-btn status-btn active" data-filter="all" onclick="setStatusFilter('all',this)">All</button>
      <button class="filter-btn status-btn" data-filter="On Track" onclick="setStatusFilter('On Track',this)">🟢 On Track</button>
      <button class="filter-btn status-btn" data-filter="At Risk" onclick="setStatusFilter('At Risk',this)">🟡 At Risk</button>
      <button class="filter-btn status-btn" data-filter="Delayed" onclick="setStatusFilter('Delayed',this)">🔴 Delayed</button>
      <button class="filter-btn status-btn" data-filter="Complete" onclick="setStatusFilter('Complete',this)">🔵 Complete</button>
      <button class="filter-btn status-btn" data-filter="Not Started" onclick="setStatusFilter('Not Started',this)">⚫ Not Started</button>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-row">
      <span class="filter-label">Goal</span>
      <button class="filter-btn goal-btn active" data-goal="all" onclick="setGoalFilter('all',this)">All Goals</button>
      <button class="filter-btn goal-btn" data-goal="0" onclick="setGoalFilter('0',this)"><span class="goal-dot" style="background:#7c3aed"></span>Goal 1 · Fundraising</button>
      <button class="filter-btn goal-btn" data-goal="1" onclick="setGoalFilter('1',this)"><span class="goal-dot" style="background:#e8185e"></span>Goal 2 · Donor Diversification</button>
      <button class="filter-btn goal-btn" data-goal="2" onclick="setGoalFilter('2',this)"><span class="goal-dot" style="background:#0891b2"></span>Goal 3 · Impact Metrics</button>
      <button class="filter-btn goal-btn" data-goal="3" onclick="setGoalFilter('3',this)"><span class="goal-dot" style="background:#059669"></span>Goal 4 · Process Audit</button>
    </div>
  </div>

  <div class="goals-grid" id="goalsGrid"></div>
</div>

<div class="save-toast" id="saveToast">✓ Progress saved</div>

<script>
// ============================================================
// AIRTABLE CONFIGURATION
// Replace these values before deploying to production
// ============================================================
const AIRTABLE_TOKEN = 'YOUR_PERSONAL_ACCESS_TOKEN_HERE';
const AIRTABLE_BASE_ID = 'YOUR_BASE_ID_HERE';
const AIRTABLE_TABLE_NAME = 'Goals Tracking';
// ============================================================

const AIRTABLE_ENABLED = AIRTABLE_TOKEN !== 'YOUR_PERSONAL_ACCESS_TOKEN_HERE' && AIRTABLE_BASE_ID !== 'YOUR_BASE_ID_HERE';
const AIRTABLE_API = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}`;
const AIRTABLE_HEADERS = {
  'Authorization': `Bearer ${AIRTABLE_TOKEN}`,
  'Content-Type': 'application/json'
};

// Airtable record ID cache: maps initiative key -> Airtable record ID
let airtableRecordIds = {};

// Show/hide a subtle sync indicator in the header
function setSyncStatus(state) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  const states = {
    syncing: { text: '⟳ Syncing…',  color: '#d97706' },
    saved:   { text: '✓ Synced',     color: '#16a34a' },
    error:   { text: '✗ Sync error', color: '#dc2626' },
    offline: { text: '● Local only', color: '#9ca3af' }
  };
  const s = states[state] || states.offline;
  el.textContent = s.text;
  el.style.color = s.color;
  if (state === 'saved') setTimeout(() => { el.textContent = ''; }, 3000);
}

// Load all statuses from Airtable on startup
async function loadFromAirtable() {
  if (!AIRTABLE_ENABLED) { setSyncStatus('offline'); return; }
  try {
    setSyncStatus('syncing');
    let allRecords = [];
    let offset = null;
    do {
      const url = offset ? `${AIRTABLE_API}?offset=${offset}` : AIRTABLE_API;
      const res = await fetch(url, { headers: AIRTABLE_HEADERS });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allRecords = allRecords.concat(data.records || []);
      offset = data.offset || null;
    } while (offset);

    allRecords.forEach(record => {
      const key = record.fields['InitiativeKey'];
      const status = record.fields['Status'];
      if (key && status) {
        statuses[key] = status;
        localStorage.setItem(key, status);
        airtableRecordIds[key] = record.id;
      }
    });
    setSyncStatus('saved');
    renderGoals();
    updateSummary();
  } catch (err) {
    console.warn('Airtable load failed, using localStorage:', err);
    setSyncStatus('error');
  }
}

// Push a single status change to Airtable
async function syncToAirtable(key, value) {
  if (!AIRTABLE_ENABLED) return;
  try {
    setSyncStatus('syncing');
    const existingId = airtableRecordIds[key];
    if (existingId) {
      // Update existing record
      await fetch(`${AIRTABLE_API}/${existingId}`, {
        method: 'PATCH',
        headers: AIRTABLE_HEADERS,
        body: JSON.stringify({ fields: { Status: value } })
      });
    } else {
      // Create new record
      const res = await fetch(AIRTABLE_API, {
        method: 'POST',
        headers: AIRTABLE_HEADERS,
        body: JSON.stringify({ fields: { InitiativeKey: key, Status: value } })
      });
      const data = await res.json();
      if (data.id) airtableRecordIds[key] = data.id;
    }
    setSyncStatus('saved');
  } catch (err) {
    console.warn('Airtable sync failed:', err);
    setSyncStatus('error');
  }
}

// Build initiative key for storage
function ikey(gIdx, sIdx, iIdx) {
  return `hrf_2026_g${gIdx}_s${sIdx}_i${iIdx}`;
}

// Load saved statuses
function loadStatuses() {
  const saved = {};
  GOALS.forEach((g, gi) => {
    g.sections.forEach((s, si) => {
      s.initiatives.forEach((_, ii) => {
        const k = ikey(gi,si,ii);
        saved[k] = localStorage.getItem(k) || 'Not Started';
      });
    });
  });
  return saved;
}

let statuses = loadStatuses();
let currentFilter = 'all';
let currentGoalFilter = 'all';

function saveStatus(key, val) {
  statuses[key] = val;
  localStorage.setItem(key, val);
  updateSummary();
  showToast();
  syncToAirtable(key, val);
}

let toastTimer;
function showToast() {
  const t = document.getElementById('saveToast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function setStatusFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGoals();
}

function setGoalFilter(goal, btn) {
  currentGoalFilter = goal;
  document.querySelectorAll('.goal-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGoals();
}

function getStatusCounts() {
  const counts = { 'On Track': 0, 'At Risk': 0, 'Delayed': 0, 'Complete': 0, 'Not Started': 0 };
  Object.values(statuses).forEach(v => {
    if (counts[v] !== undefined) counts[v]++;
  });
  return counts;
}

// ── Donut chart (Chart.js) ───────────────────────────────────────────────────
let donutChartInstance = null;
const STATUS_COLORS = {
  'On Track':    '#16a34a',
  'At Risk':     '#d97706',
  'Delayed':     '#dc2626',
  'Complete':    '#2563eb',
  'Not Started': '#eab308'
};
const GOAL_COLORS_VIZ = ['#9ca3af','#9ca3af','#9ca3af','#9ca3af'];
const GOAL_NAMES_SHORT = ['Fundraising','Donor Diversification','Impact Metrics','Process Audit'];



function initDonut() {
  const ctx = document.getElementById('donutChart');
  if (!ctx) return;
  const counts = getStatusCounts();
  const labels = Object.keys(STATUS_COLORS);
  const data   = labels.map(l => counts[l] || 0);
  const colors = labels.map(l => STATUS_COLORS[l]);
  if (donutChartInstance) { donutChartInstance.destroy(); }
  donutChartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff', hoverOffset: 4 }] },
    options: {
      responsive: false,
      cutout: '68%',
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      animation: { duration: 500 }
    }
  });
}

function updateDonut() {
  const counts = getStatusCounts();
  const total  = GOALS.reduce((a,g) => a + g.sections.reduce((b,s) => b + s.initiatives.length, 0), 0);
  const done   = counts['Complete'] || 0;
  const pct    = total > 0 ? Math.round((done/total)*100) : 0;

  if (donutChartInstance) {
    const labels = Object.keys(STATUS_COLORS);
    donutChartInstance.data.datasets[0].data = labels.map(l => counts[l] || 0);
    donutChartInstance.update('none');
  }
  const pctEl = document.getElementById('donutPct');
  if (pctEl) pctEl.textContent = pct + '%';

  // Legend
  const leg = document.getElementById('donutLegend');
  if (leg) {
    leg.innerHTML = Object.entries(STATUS_COLORS).map(([label, color]) =>
      `<div class="dl-item">
        <span class="dl-dot" style="background:${color}"></span>
        <span>${label}</span>
        <span class="dl-count">${counts[label] || 0}</span>
      </div>`
    ).join('');
  }
}

function getProgressColor(pct) {
  if (pct === 0)       return '#d1d5db';
  if (pct <= 25)       return '#fbbf24';
  if (pct <= 50)       return '#fb923c';
  if (pct <= 75)       return '#4ade80';
  return '#16a34a';
}

function updateGoalBars() {
  const el = document.getElementById('goalBars');
  if (!el) return;
  el.innerHTML = GOALS.map((goal, gi) => {
    const total = goal.sections.reduce((a,s) => a + s.initiatives.length, 0);
    const counts = { 'On Track':0,'At Risk':0,'Delayed':0,'Complete':0,'Not Started':0 };
    goal.sections.forEach((s,si) => s.initiatives.forEach((_,ii) => {
      const v = statuses[ikey(gi,si,ii)] || 'Not Started';
      if (counts[v] !== undefined) counts[v]++;
    }));
    const done = counts['Complete'];
    const pct  = total > 0 ? Math.round((done/total)*100) : 0;
    const dotColor = GOAL_COLORS_VIZ[gi];
    const barColor = getProgressColor(pct);

    return `<div class="gbar-row">
      <div class="gbar-meta">
        <span class="gbar-name"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${dotColor};margin-right:6px;vertical-align:middle"></span>Goal ${gi+1} · ${GOAL_NAMES_SHORT[gi]}</span>
        <span class="gbar-pct" style="color:${barColor}">${pct}%</span>
      </div>
      <div class="gbar-track"><div class="gbar-fill" style="width:${pct > 0 ? Math.max(pct,2) : 0}%;background:${barColor}"></div></div>
    </div>`;
  }).join('');
}



function updateSummary() {
  const total  = GOALS.reduce((acc, g) => acc + g.sections.reduce((a, s) => a + s.initiatives.length, 0), 0);
  const counts = getStatusCounts();

  document.getElementById('summaryRow').innerHTML = `
    <div class="stat-pill pill-total"><span class="count">${total}</span> <span>Initiatives</span></div>
    <div class="stat-pill pill-on-track"><span class="dot"></span><span class="count">${counts['On Track']}</span> On Track</div>
    <div class="stat-pill pill-at-risk"><span class="dot"></span><span class="count">${counts['At Risk']}</span> At Risk</div>
    <div class="stat-pill pill-delayed"><span class="dot"></span><span class="count">${counts['Delayed']}</span> Delayed</div>
    <div class="stat-pill pill-complete"><span class="dot"></span><span class="count">${counts['Complete']}</span> Complete</div>
    <div class="stat-pill pill-not-started"><span class="dot"></span><span class="count">${counts['Not Started']}</span> Not Started</div>
  `;

  updateDonut();
  updateGoalBars();
}

function getInitiativeStatus(gi, si, ii) {
  return statuses[ikey(gi,si,ii)] || 'Not Started';
}

function initiativeMatchesFilter(gi, si, ii) {
  const statusOk = currentFilter === 'all' || getInitiativeStatus(gi, si, ii) === currentFilter;
  const goalOk   = currentGoalFilter === 'all' || String(gi) === currentGoalFilter;
  return statusOk && goalOk;
}

function makeStatusSelect(key) {
  const val = statuses[key] || 'Not Started';
  const cls = STATUS_CLASS[val] || 'not-started';
  const options = STATUS_OPTIONS.map(o =>
    `<option value="${o}" ${o===val?'selected':''}>${o}</option>`
  ).join('');
  return `<select class="status-select ${cls}" data-key="${key}" onchange="handleStatusChange(this)">${options}</select>`;
}

function handleStatusChange(el) {
  const key = el.dataset.key;
  const val = el.value;
  el.className = 'status-select ' + (STATUS_CLASS[val] || 'not-started');
  saveStatus(key, val);
  // Live-update the ring for the goal this initiative belongs to
  const card = el.closest('.goal-card');
  if (card) {
    const gi = parseInt(card.dataset.goal);
    const pct = getGoalCompletion(gi);
    const color = GOAL_COLORS[GOALS[gi].color];
    const r = 18, circ = 2 * Math.PI * r;
    const dash = (pct / 100) * circ;
    const arcs = card.querySelectorAll('.mini-ring circle');
    const arc = arcs[arcs.length - 1];
    const label = card.querySelector('.ring-pct');
    if (arc) arc.setAttribute('stroke-dasharray', dash + ' ' + circ);
    if (label) label.textContent = pct + '%';
  }
  // Live-update the viz header
  updateGoalBars();
  updateDonut();
}

function getGoalCompletion(gi) {
  let total = 0, done = 0;
  GOALS[gi].sections.forEach((s, si) => {
    s.initiatives.forEach((_, ii) => {
      total++;
      if (statuses[ikey(gi,si,ii)] === 'Complete') done++;
    });
  });
  return total > 0 ? Math.round((done/total)*100) : 0;
}

function miniRing(pct, color) {
  const r = 18, cx = 24, cy = 24, circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return `<div class="mini-ring">
    <svg width="48" height="48" viewBox="0 0 48 48">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e2e6eb" stroke-width="4"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
    </svg>
    <div class="ring-pct">${pct}%</div>
  </div>`;
}

const GOAL_COLORS = { g1: '#8b5cf6', g2: '#ec4899', g3: '#06b6d4', g4: '#10b981' };

function renderGoals() {
  const grid = document.getElementById('goalsGrid');
  grid.innerHTML = '';

  GOALS.forEach((goal, gi) => {
    const pct = getGoalCompletion(gi);
    const color = GOAL_COLORS[goal.color];

    // Check if goal has any matching initiatives for filter
    const hasMatch = goal.sections.some((s, si) =>
      s.initiatives.some((_, ii) => initiativeMatchesFilter(gi, si, ii))
    );
    if (!hasMatch) return;

    const card = document.createElement('div');
    card.className = `goal-card ${goal.color}`;
    card.dataset.goal = gi;

    // Count initiatives for this goal
    const totalInits = goal.sections.reduce((a, s) => a + s.initiatives.length, 0);

    card.innerHTML = `
      <div class="goal-header" onclick="toggleGoal(this)">
        <div class="goal-num">${goal.num}</div>
        <div class="goal-title-wrap">
          <div class="goal-title">${goal.title}</div>
          <div class="goal-meta">${goal.sections.length} sub-areas · ${totalInits} initiatives</div>
        </div>
        <div class="goal-progress-mini">
          ${miniRing(pct, color)}
        </div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
      <div class="goal-body">
        ${goal.sections.map((section, si) => {
          const visibleInits = section.initiatives.filter((_, ii) => initiativeMatchesFilter(gi, si, ii));
          if (visibleInits.length === 0) return '';
          return `
            <div class="subgoal-section">
              <div class="subgoal-header" onclick="toggleSubgoal(this)">
                <span class="subgoal-name">▸ ${section.name}</span>
                <span style="font-size:11px;color:var(--text-muted);margin-right:8px;">${section.dept}</span>
                <span class="subgoal-count">${visibleInits.length} initiative${visibleInits.length!==1?'s':''}</span>
                <svg style="width:14px;height:14px;color:var(--text-muted);flex-shrink:0;margin-left:8px;transition:transform 0.2s" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
              <div class="subgoal-body">
                <div class="table-header">
                  <div class="th">Initiative &amp; RACI</div>
                  <div class="th">Status</div>
                </div>
                <div class="initiatives-table">
                  ${section.initiatives.map((init, ii) => {
                    if (!initiativeMatchesFilter(gi, si, ii)) return '';
                    const k = ikey(gi,si,ii);
                    const chips = [
                      init.baseline && init.baseline !== '—' ? `<span class="target-chip baseline">Baseline: ${init.baseline}</span>` : '',
                      init.target ? `<span class="target-chip target">Target: ${init.target}</span>` : '',
                      init.timeline ? `<span class="target-chip">📅 ${init.timeline}</span>` : ''
                    ].filter(Boolean).join('');
                    const raci = [
                      init.R && init.R !== '—' ? `<span class="raci-chip"><span class="raci-badge raci-R">R</span>${init.R}</span>` : '',
                      init.A && init.A !== '—' ? `<span class="raci-chip"><span class="raci-badge raci-A">A</span>${init.A}</span>` : '',
                      init.C && init.C !== '—' ? `<span class="raci-chip"><span class="raci-badge raci-C">C</span>${init.C}</span>` : '',
                      init.I && init.I !== '—' ? `<span class="raci-chip"><span class="raci-badge raci-I">I</span>${init.I}</span>` : ''
                    ].filter(Boolean).join('');
                    return `<div class="initiative-row">
                      <div class="col-initiative">
                        <div class="initiative-title">${init.title}</div>
                        ${init.rationale ? `<div class="initiative-detail">${init.rationale}</div>` : ''}
                        ${chips ? `<div class="initiative-targets">${chips}</div>` : ''}
                        ${raci ? `<div class="raci-row">${raci}</div>` : ''}
                      </div>
                      <div class="col-status">${makeStatusSelect(k)}</div>
                    </div>`;
                  }).join('')}
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    grid.appendChild(card);
  });

  // Auto-open all goals
  document.querySelectorAll('.goal-card').forEach(c => c.classList.add('open'));
  // Auto-open all subgoal bodies
  document.querySelectorAll('.subgoal-body').forEach(b => b.style.display = 'block');
}

function toggleGoal(header) {
  const card = header.closest('.goal-card');
  card.classList.toggle('open');
}

function toggleSubgoal(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('svg');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
}

// Init — load from Airtable if configured, otherwise fall back to localStorage
renderGoals();
updateSummary();
loadFromAirtable();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof Chart !== 'undefined') {
    initDonut();
    updateDonut();
  }
});
// Fallback if DOMContentLoaded already fired
if (document.readyState === 'complete' || document.readyState === 'interactive') {
  setTimeout(function() {
    if (typeof Chart !== 'undefined' && !donutChartInstance) {
      initDonut();
      updateDonut();
    }
  }, 100);
}
</script>
</body>
</html>
